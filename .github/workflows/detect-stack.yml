name: detect-stack

on:
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests openai jsonschema

      - name: Run detection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO:    ${{ inputs.target_repo }}
        run: python detect_stack.py

      - uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: manifest.json