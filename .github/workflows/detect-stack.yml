name: detect-stack

on:
  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      upload_debug_artifact:
        required: false
        type: boolean
        default: false
    outputs:
      manifest:
        description: "Path to manifest.json artifact"
        value: ${{ jobs.detect.outputs.manifest }}
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      manifest: manifest.json
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stack detection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO:    ${{ inputs.target_repo }}
        run: python scripts/detect_stack.py

      - name: Generate QA strategy and test cases
        run: python scripts/generate_qa_strategy.py

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: stack-manifest
          path: |
            manifest.json
            qa_strategy.json
            test_cases.json

      - name: Upload debug artifact
        if: ${{ inputs.upload_debug_artifact }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: stack-manifest-debug
          path: manifest_debug.json